<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-Assignment-5</title>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
            padding: 10px;
        }
    </style>
</head>
<body>
    <Table>
        <caption>Electro-Mart Product Price List</caption>
        <thead>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
        </thead>
        <tbody>
            <tr>
                <td>Samsung A14</td>
                <td rowspan="2">Mobile</td>
                <td>$250</td>
                <td>Yes</td>
            </tr>

             <tr>
                <td>iPhone 13</td>
                <td>$799</td>
                <td>No</td>
            </tr>

             <tr>
                <td>HP Laptop 15</td>
                <td rowspan="2">Laptop</td>
                <td>$650</td>
                <td>Yes</td>
            </tr>

             <tr>
                <td>MacBook Pro</td>
                <td>$1200</td>
                <td>No</td>
            </tr>
        </tbody>
    </Table>
</body>
</html>
